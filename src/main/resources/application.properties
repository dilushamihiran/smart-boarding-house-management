# Application Config
spring.application.name=SmartBoardingHouse
server.port=8080

# ==========================================
# 1. Database Configuration (H2 for Development)
# ==========================================
# (H2 එක දැන් පාවිච්චි කරන්නේ නැති නිසා මේ ටික ඉස්සරහට '#' අකුර දාලා තියන්න)
#spring.datasource.url=jdbc:h2:mem:boardingdb
#spring.datasource.driverClassName=org.h2.Driver
#spring.datasource.username=sa
#spring.datasource.password=
#spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ==========================================
# 2. Database Configuration (MySQL / XAMPP)
# ==========================================
# (MySQL වලට connect වෙන්න මේ ටිකේ ඉස්සරහා තියෙන '#' අකුර අයින් කරන්න)
spring.datasource.url=jdbc:mysql://localhost:3306/boardingdb?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Mail Configuration (Using Mailtrap or Dummy settings for dev)
spring.mail.host=smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=your_mailtrap_username
spring.mail.password=your_mailtrap_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# File Upload Max Size
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# File Upload Directory
file.upload-dir=uploads/rooms

# Thymeleaf cache
spring.thymeleaf.cache=false
