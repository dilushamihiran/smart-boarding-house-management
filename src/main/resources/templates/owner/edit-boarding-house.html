<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{base :: head('Edit Boarding House')}"></head>
<body class="bg-light">
<nav th:replace="~{base :: navbar}"></nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card border-0 rounded-4 shadow-sm">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-pencil-square display-4 text-secondary"></i>
                        <h3 class="fw-bold mt-2">Edit Boarding House</h3>
                        <p class="text-muted">Update the details of your boarding house</p>
                    </div>

                    <form th:action="@{/owner/boarding-houses/{id}/edit(id=${boardingHouse.id})}"
                          th:object="${boardingHouse}" method="post">
                        <div class="mb-3">
                            <label for="name" class="form-label fw-semibold">
                                <i class="bi bi-building me-1"></i> Boarding House Name
                            </label>
                            <input type="text" class="form-control rounded-3 py-2" id="name" th:field="*{name}"
                                   placeholder="Enter boarding house name" required>
                        </div>

                        <div class="mb-3">
                            <label for="address" class="form-label fw-semibold">
                                <i class="bi bi-geo-alt me-1"></i> Address
                            </label>
                            <input type="text" class="form-control rounded-3 py-2" id="address" th:field="*{address}"
                                   placeholder="Enter full address" required>
                        </div>

                        <div class="mb-3">
                            <label for="district" class="form-label fw-semibold">
                                <i class="bi bi-pin-map me-1"></i> District
                            </label>
                            <select class="form-select rounded-3 py-2" id="district" th:field="*{district}" required>
                                <option value="">Select District</option>
                                <option value="Ampara">Ampara</option>
                                <option value="Anuradhapura">Anuradhapura</option>
                                <option value="Badulla">Badulla</option>
                                <option value="Batticaloa">Batticaloa</option>
                                <option value="Colombo">Colombo</option>
                                <option value="Galle">Galle</option>
                                <option value="Gampaha">Gampaha</option>
                                <option value="Hambantota">Hambantota</option>
                                <option value="Jaffna">Jaffna</option>
                                <option value="Kalutara">Kalutara</option>
                                <option value="Kandy">Kandy</option>
                                <option value="Kegalle">Kegalle</option>
                                <option value="Kilinochchi">Kilinochchi</option>
                                <option value="Kurunegala">Kurunegala</option>
                                <option value="Mannar">Mannar</option>
                                <option value="Matale">Matale</option>
                                <option value="Matara">Matara</option>
                                <option value="Monaragala">Monaragala</option>
                                <option value="Mullaitivu">Mullaitivu</option>
                                <option value="Nuwara Eliya">Nuwara Eliya</option>
                                <option value="Polonnaruwa">Polonnaruwa</option>
                                <option value="Puttalam">Puttalam</option>
                                <option value="Ratnapura">Ratnapura</option>
                                <option value="Trincomalee">Trincomalee</option>
                                <option value="Vavuniya">Vavuniya</option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label for="description" class="form-label fw-semibold">
                                <i class="bi bi-text-paragraph me-1"></i> Description
                            </label>
                            <textarea class="form-control rounded-3" id="description" th:field="*{description}"
                                      rows="4" placeholder="Describe your boarding house, amenities, etc."></textarea>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary rounded-pill px-4 py-2 flex-grow-1">
                                <i class="bi bi-check-lg me-1"></i> Update Boarding House
                            </button>
                            <a href="/owner/dashboard" class="btn btn-outline-secondary rounded-pill px-4 py-2">
                                <i class="bi bi-arrow-left me-1"></i> Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{base :: scripts}"></div>
</body>
</html>
