<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{base :: head('Owner Dashboard')}"></head>
<body class="bg-light">
<nav th:replace="~{base :: navbar}"></nav>

<div class="container py-5">
    <!-- Flash Messages -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show rounded-4 shadow-sm" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-1">
                <i class="bi bi-house-heart-fill text-primary me-2"></i>Owner Dashboard
            </h2>
            <p class="text-muted mb-0">Welcome back, <span class="fw-semibold" th:text="${ownerName}">Owner</span>!</p>
        </div>
        <a href="/owner/boarding-houses/add" class="btn btn-primary rounded-pill px-4 py-2 shadow-sm">
            <i class="bi bi-plus-lg me-1"></i> Add New Boarding House
        </a>
    </div>

    <!-- Empty State -->
    <div th:if="${#lists.isEmpty(boardingHouses)}" class="text-center py-5">
        <div class="card rounded-4 shadow-sm border-0 p-5">
            <i class="bi bi-house-add display-1 text-muted"></i>
            <h4 class="mt-3 text-muted">No Boarding Houses Yet</h4>
            <p class="text-muted">Start by adding your first boarding house to get listed.</p>
            <a href="/owner/boarding-houses/add" class="btn btn-outline-primary rounded-pill px-4">
                <i class="bi bi-plus-lg me-1"></i> Add Boarding House
            </a>
        </div>
    </div>

    <!-- Boarding House Cards -->
    <div class="row g-4" th:unless="${#lists.isEmpty(boardingHouses)}">
        <div class="col-md-6 col-lg-4" th:each="bh : ${boardingHouses}">
            <div class="card border-0 rounded-4 shadow-sm h-100">
                <div class="card-body p-4">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <h5 class="card-title fw-bold mb-0" th:text="${bh.name}">House Name</h5>
                        <span class="badge rounded-pill"
                              th:classappend="${bh.status.name() == 'PENDING'} ? 'bg-warning text-dark' : (${bh.status.name() == 'APPROVED'} ? 'bg-success' : 'bg-danger')"
                              th:text="${bh.status}">Status</span>
                    </div>
                    <div class="mb-2">
                        <i class="bi bi-geo-alt-fill text-danger me-1"></i>
                        <small class="text-muted" th:text="${bh.address}">Address</small>
                    </div>
                    <div class="mb-3">
                        <i class="bi bi-pin-map-fill text-info me-1"></i>
                        <small class="text-muted" th:text="${bh.district}">District</small>
                    </div>
                    <p class="card-text text-muted small" th:text="${bh.description}">Description</p>
                </div>
                <div class="card-footer bg-transparent border-0 p-4 pt-0">
                    <div class="d-flex gap-2 flex-wrap">
                        <a th:href="@{/owner/boarding-houses/{id}/rooms(id=${bh.id})}"
                           class="btn btn-sm btn-outline-primary rounded-pill px-3">
                            <i class="bi bi-door-open me-1"></i> Rooms
                        </a>
                        <a th:href="@{/owner/boarding-houses/{id}/edit(id=${bh.id})}"
                           class="btn btn-sm btn-outline-secondary rounded-pill px-3">
                            <i class="bi bi-pencil me-1"></i> Edit
                        </a>
                        <form th:action="@{/owner/boarding-houses/{id}/delete(id=${bh.id})}" method="post"
                              onsubmit="return confirm('Are you sure you want to delete this boarding house?');">
                            <button type="submit" class="btn btn-sm btn-outline-danger rounded-pill px-3">
                                <i class="bi bi-trash me-1"></i> Delete
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{base :: scripts}"></div>
</body>
</html>
