<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{base :: head('Manage Bookings')}"></head>
<body class="bg-light">
    <nav th:replace="~{base :: navbar}"></nav>

    <div class="container py-5 mt-5">
        <!-- Flash Messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show rounded-4 shadow-sm" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i>
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Header -->
        <div class="d-flex align-items-center mb-4">
            <div class="rounded-circle d-flex align-items-center justify-content-center me-3"
                 style="width:56px; height:56px; background: linear-gradient(135deg, #f59e0b, #d97706);">
                <i class="bi bi-calendar-check-fill text-white fs-4"></i>
            </div>
            <div>
                <h2 class="fw-bold mb-0">Manage Bookings</h2>
                <p class="text-muted mb-0">Review and manage booking requests for your properties.</p>
            </div>
        </div>

        <!-- Bookings Table -->
        <div class="card border-0 rounded-4 shadow-sm">
            <div class="card-body p-4">
                <div th:if="${#lists.isEmpty(bookings)}" class="text-center py-5">
                    <i class="bi bi-calendar-x text-muted" style="font-size: 3rem;"></i>
                    <p class="text-muted mt-3 mb-0">No booking requests yet.</p>
                </div>
                <div th:unless="${#lists.isEmpty(bookings)}" class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Student Name</th>
                                <th>Room</th>
                                <th>Check-In</th>
                                <th>Duration</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="b : ${bookings}">
                                <td>
                                    <i class="bi bi-person-circle me-1 text-primary"></i>
                                    <span th:text="${b.user.fullName}">Student</span>
                                </td>
                                <td>
                                    <i class="bi bi-door-open me-1 text-muted"></i>
                                    <span th:text="${b.room.roomName}">Room</span>
                                    <br/>
                                    <small class="text-muted" th:text="${b.room.boardingHouse.name}">BH</small>
                                </td>
                                <td th:text="${b.checkInDate}">2025-01-01</td>
                                <td>
                                    <span th:text="${b.durationMonths}">1</span> month(s)
                                </td>
                                <td>
                                    <span class="badge rounded-pill"
                                          th:classappend="${b.status.name() == 'PENDING' ? 'bg-warning text-dark' :
                                                           (b.status.name() == 'APPROVED' ? 'bg-success' :
                                                           (b.status.name() == 'REJECTED' ? 'bg-danger' : 'bg-secondary'))}"
                                          th:text="${b.status}">PENDING</span>
                                </td>
                                <td>
                                    <div th:if="${b.status.name() == 'PENDING'}" class="d-flex gap-2">
                                        <form th:action="@{'/owner/bookings/' + ${b.id} + '/approve'}" method="post">
                                            <button type="submit" class="btn btn-success btn-sm rounded-pill"
                                                    onclick="return confirm('Approve this booking?')">
                                                <i class="bi bi-check-lg me-1"></i>Approve
                                            </button>
                                        </form>
                                        <form th:action="@{'/owner/bookings/' + ${b.id} + '/reject'}" method="post">
                                            <button type="submit" class="btn btn-outline-danger btn-sm rounded-pill"
                                                    onclick="return confirm('Reject this booking?')">
                                                <i class="bi bi-x-lg me-1"></i>Reject
                                            </button>
                                        </form>
                                    </div>
                                    <span th:if="${b.status.name() != 'PENDING'}" class="text-muted small">—</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script th:replace="~{base :: scripts}"></script>
</body>
</html>
