<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{base :: head('Manage Rooms')}"></head>
<body class="bg-light">
<nav th:replace="~{base :: navbar}"></nav>

<div class="container py-5">
    <!-- Flash Messages -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show rounded-4 shadow-sm" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-1">
                <i class="bi bi-door-open-fill text-primary me-2"></i>Rooms
            </h2>
            <p class="text-muted mb-0">
                Managing rooms for <span class="fw-semibold" th:text="${boardingHouse.name}">Boarding House</span>
            </p>
        </div>
        <div class="d-flex gap-2">
            <a th:href="@{/owner/boarding-houses/{id}/rooms/add(id=${boardingHouse.id})}"
               class="btn btn-primary rounded-pill px-4 py-2 shadow-sm">
                <i class="bi bi-plus-lg me-1"></i> Add Room
            </a>
            <a href="/owner/dashboard" class="btn btn-outline-secondary rounded-pill px-4 py-2">
                <i class="bi bi-arrow-left me-1"></i> Back
            </a>
        </div>
    </div>

    <!-- Empty State -->
    <div th:if="${#lists.isEmpty(rooms)}" class="text-center py-5">
        <div class="card rounded-4 shadow-sm border-0 p-5">
            <i class="bi bi-door-closed display-1 text-muted"></i>
            <h4 class="mt-3 text-muted">No Rooms Added Yet</h4>
            <p class="text-muted">Add rooms to this boarding house to start receiving bookings.</p>
            <a th:href="@{/owner/boarding-houses/{id}/rooms/add(id=${boardingHouse.id})}"
               class="btn btn-outline-primary rounded-pill px-4">
                <i class="bi bi-plus-lg me-1"></i> Add First Room
            </a>
        </div>
    </div>

    <!-- Rooms Table -->
    <div th:unless="${#lists.isEmpty(rooms)}" class="card border-0 rounded-4 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0 align-middle">
                    <thead class="bg-light">
                        <tr>
                            <th class="ps-4 py-3 fw-semibold text-muted">Room Name</th>
                            <th class="py-3 fw-semibold text-muted">Capacity</th>
                            <th class="py-3 fw-semibold text-muted">Price (LKR)</th>
                            <th class="py-3 fw-semibold text-muted">Availability</th>
                            <th class="py-3 fw-semibold text-muted text-end pe-4">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="room : ${rooms}">
                            <td class="ps-4 py-3">
                                <i class="bi bi-door-open text-primary me-2"></i>
                                <span class="fw-semibold" th:text="${room.roomName}">Room 1</span>
                            </td>
                            <td class="py-3">
                                <i class="bi bi-people-fill text-muted me-1"></i>
                                <span th:text="${room.capacity}">2</span> persons
                            </td>
                            <td class="py-3">
                                <span class="fw-bold text-success" th:text="'Rs. ' + ${#numbers.formatDecimal(room.price, 1, 2)}">Rs. 5000.00</span>
                            </td>
                            <td class="py-3">
                                <span class="badge rounded-pill px-3 py-2"
                                      th:classappend="${room.availability} ? 'bg-success' : 'bg-secondary'"
                                      th:text="${room.availability} ? 'Available' : 'Occupied'">Available</span>
                            </td>
                            <td class="py-3 text-end pe-4">
                                <div class="d-flex gap-2 justify-content-end">
                                    <form th:action="@{/owner/rooms/{id}/toggle-availability(id=${room.id})}" method="post">
                                        <button type="submit" class="btn btn-sm rounded-pill px-3"
                                                th:classappend="${room.availability} ? 'btn-outline-warning' : 'btn-outline-success'">
                                            <i class="bi" th:classappend="${room.availability} ? 'bi-toggle-on' : 'bi-toggle-off'"></i>
                                            <span th:text="${room.availability} ? 'Set Occupied' : 'Set Available'">Toggle</span>
                                        </button>
                                    </form>
                                    <form th:action="@{/owner/rooms/{id}/delete(id=${room.id})}" method="post"
                                          onsubmit="return confirm('Are you sure you want to delete this room?');">
                                        <button type="submit" class="btn btn-sm btn-outline-danger rounded-pill px-3">
                                            <i class="bi bi-trash me-1"></i> Delete
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{base :: scripts}"></div>
</body>
</html>
