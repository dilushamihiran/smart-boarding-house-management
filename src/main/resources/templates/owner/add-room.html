<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{base :: head('Add Room')}"></head>
<body class="bg-light">
<nav th:replace="~{base :: navbar}"></nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card border-0 rounded-4 shadow-sm">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-door-open-fill display-4 text-primary"></i>
                        <h3 class="fw-bold mt-2">Add New Room</h3>
                        <p class="text-muted">Add a room to your boarding house</p>
                    </div>

                    <form th:action="@{/owner/boarding-houses/{id}/rooms/add(id=${bhId})}"
                          th:object="${room}" method="post">
                        <div class="mb-3">
                            <label for="roomName" class="form-label fw-semibold">
                                <i class="bi bi-door-open me-1"></i> Room Name
                            </label>
                            <input type="text" class="form-control rounded-3 py-2" id="roomName" th:field="*{roomName}"
                                   placeholder="e.g., Room A1, Deluxe Single" required>
                        </div>

                        <div class="mb-3">
                            <label for="capacity" class="form-label fw-semibold">
                                <i class="bi bi-people me-1"></i> Capacity (persons)
                            </label>
                            <input type="number" class="form-control rounded-3 py-2" id="capacity" th:field="*{capacity}"
                                   placeholder="Number of persons" min="1" required>
                        </div>

                        <div class="mb-4">
                            <label for="price" class="form-label fw-semibold">
                                <i class="bi bi-currency-dollar me-1"></i> Monthly Price (LKR)
                            </label>
                            <div class="input-group">
                                <span class="input-group-text rounded-start-3 bg-light">Rs.</span>
                                <input type="number" class="form-control rounded-end-3 py-2" id="price" th:field="*{price}"
                                       placeholder="0.00" step="0.01" min="0" required>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary rounded-pill px-4 py-2 flex-grow-1">
                                <i class="bi bi-check-lg me-1"></i> Add Room
                            </button>
                            <a th:href="@{/owner/boarding-houses/{id}/rooms(id=${bhId})}"
                               class="btn btn-outline-secondary rounded-pill px-4 py-2">
                                <i class="bi bi-arrow-left me-1"></i> Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{base :: scripts}"></div>
</body>
</html>
