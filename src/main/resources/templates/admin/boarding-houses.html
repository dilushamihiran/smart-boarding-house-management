<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{base :: head('Boarding House Management')}"></head>
<body class="bg-light">
    <nav th:replace="~{base :: navbar}"></nav>

    <div class="container py-5 mt-5">
        <!-- Page Header -->
        <div class="d-flex align-items-center justify-content-between mb-4">
            <div class="d-flex align-items-center">
                <a th:href="@{/admin/dashboard}" class="btn btn-outline-secondary rounded-pill me-3">
                    <i class="bi bi-arrow-left me-1"></i> Back
                </a>
                <div>
                    <h2 class="fw-bold mb-0"><i class="bi bi-houses-fill text-success me-2"></i>Boarding Houses</h2>
                    <p class="text-muted mb-0">Approve, reject, and manage all boarding house listings.</p>
                </div>
            </div>
        </div>

        <!-- Flash Messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show rounded-3 shadow-sm" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i>
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show rounded-3 shadow-sm" role="alert">
            <i class="bi bi-x-circle-fill me-2"></i>
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Boarding Houses Table Card -->
        <div class="card border-0 rounded-4 shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead>
                            <tr class="bg-light">
                                <th class="ps-4 py-3 text-muted small fw-semibold text-uppercase">ID</th>
                                <th class="py-3 text-muted small fw-semibold text-uppercase">Name</th>
                                <th class="py-3 text-muted small fw-semibold text-uppercase">Address</th>
                                <th class="py-3 text-muted small fw-semibold text-uppercase">District</th>
                                <th class="py-3 text-muted small fw-semibold text-uppercase">Owner</th>
                                <th class="py-3 text-muted small fw-semibold text-uppercase">Status</th>
                                <th class="pe-4 py-3 text-muted small fw-semibold text-uppercase text-end">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="bh : ${boardingHouses}">
                                <td class="ps-4 fw-semibold" th:text="${bh.id}"></td>
                                <td>
                                    <div class="d-flex align-items-center">
                                        <div class="rounded-3 d-flex align-items-center justify-content-center me-2"
                                             style="width:36px; height:36px; background: linear-gradient(135deg, #f0fdf4, #dcfce7);">
                                            <i class="bi bi-house-fill text-success"></i>
                                        </div>
                                        <span class="fw-medium" th:text="${bh.name}"></span>
                                    </div>
                                </td>
                                <td class="text-muted" th:text="${bh.address}"></td>
                                <td class="text-muted" th:text="${bh.district}"></td>
                                <td>
                                    <span class="fw-medium" th:text="${bh.owner.fullName}"></span>
                                </td>
                                <td>
                                    <span th:if="${bh.status.name() == 'PENDING'}" class="badge rounded-pill bg-warning bg-opacity-10 text-warning px-3 py-2">
                                        <i class="bi bi-clock-fill me-1"></i>Pending
                                    </span>
                                    <span th:if="${bh.status.name() == 'APPROVED'}" class="badge rounded-pill bg-success bg-opacity-10 text-success px-3 py-2">
                                        <i class="bi bi-check-circle-fill me-1"></i>Approved
                                    </span>
                                    <span th:if="${bh.status.name() == 'REJECTED'}" class="badge rounded-pill bg-danger bg-opacity-10 text-danger px-3 py-2">
                                        <i class="bi bi-x-circle-fill me-1"></i>Rejected
                                    </span>
                                </td>
                                <td class="pe-4 text-end">
                                    <div class="d-inline-flex gap-2">
                                        <!-- Approve (only for PENDING) -->
                                        <form th:if="${bh.status.name() == 'PENDING'}"
                                              th:action="@{/admin/boarding-houses/{id}/approve(id=${bh.id})}" method="post" class="d-inline">
                                            <button type="submit" class="btn btn-sm btn-outline-success rounded-pill px-3"
                                                    title="Approve">
                                                <i class="bi bi-check-lg me-1"></i>Approve
                                            </button>
                                        </form>
                                        <!-- Reject (only for PENDING) -->
                                        <form th:if="${bh.status.name() == 'PENDING'}"
                                              th:action="@{/admin/boarding-houses/{id}/reject(id=${bh.id})}" method="post" class="d-inline">
                                            <button type="submit" class="btn btn-sm btn-outline-danger rounded-pill px-3"
                                                    title="Reject">
                                                <i class="bi bi-x-lg me-1"></i>Reject
                                            </button>
                                        </form>
                                        <!-- Delete (always available) -->
                                        <form th:action="@{/admin/boarding-houses/{id}/delete(id=${bh.id})}" method="post" class="d-inline"
                                              onsubmit="return confirm('Are you sure you want to delete this boarding house? This action cannot be undone.');">
                                            <button type="submit" class="btn btn-sm btn-outline-danger rounded-pill px-3"
                                                    title="Delete">
                                                <i class="bi bi-trash3 me-1"></i>Delete
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            <!-- Empty State -->
                            <tr th:if="${#lists.isEmpty(boardingHouses)}">
                                <td colspan="7" class="text-center py-5 text-muted">
                                    <i class="bi bi-inbox fs-1 d-block mb-2 opacity-50"></i>
                                    No boarding houses found.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script th:replace="~{base :: scripts}"></script>
</body>
</html>
