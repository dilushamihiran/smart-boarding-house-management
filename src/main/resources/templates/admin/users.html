<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{base :: head('User Management')}"></head>
<body class="bg-light">
    <nav th:replace="~{base :: navbar}"></nav>

    <div class="container py-5 mt-5">
        <!-- Page Header -->
        <div class="d-flex align-items-center justify-content-between mb-4">
            <div class="d-flex align-items-center">
                <a th:href="@{/admin/dashboard}" class="btn btn-outline-secondary rounded-pill me-3">
                    <i class="bi bi-arrow-left me-1"></i> Back
                </a>
                <div>
                    <h2 class="fw-bold mb-0"><i class="bi bi-people-fill text-primary me-2"></i>User Management</h2>
                    <p class="text-muted mb-0">View, enable/disable, and manage all registered users.</p>
                </div>
            </div>
        </div>

        <!-- Flash Messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show rounded-3 shadow-sm" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i>
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show rounded-3 shadow-sm" role="alert">
            <i class="bi bi-x-circle-fill me-2"></i>
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Users Table Card -->
        <div class="card border-0 rounded-4 shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead>
                            <tr class="bg-light">
                                <th class="ps-4 py-3 text-muted small fw-semibold text-uppercase">ID</th>
                                <th class="py-3 text-muted small fw-semibold text-uppercase">Name</th>
                                <th class="py-3 text-muted small fw-semibold text-uppercase">Email</th>
                                <th class="py-3 text-muted small fw-semibold text-uppercase">Phone</th>
                                <th class="py-3 text-muted small fw-semibold text-uppercase">Role</th>
                                <th class="py-3 text-muted small fw-semibold text-uppercase">Status</th>
                                <th class="pe-4 py-3 text-muted small fw-semibold text-uppercase text-end">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="user : ${users}">
                                <td class="ps-4 fw-semibold" th:text="${user.id}"></td>
                                <td>
                                    <div class="d-flex align-items-center">
                                        <div class="rounded-circle d-flex align-items-center justify-content-center me-2"
                                             style="width:36px; height:36px; background: linear-gradient(135deg, #eff6ff, #dbeafe);">
                                            <i class="bi bi-person-fill text-primary"></i>
                                        </div>
                                        <span class="fw-medium" th:text="${user.fullName}"></span>
                                    </div>
                                </td>
                                <td class="text-muted" th:text="${user.email}"></td>
                                <td class="text-muted" th:text="${user.phone}"></td>
                                <td>
                                    <span th:if="${user.role.name() == 'ROLE_STUDENT'}" class="badge rounded-pill bg-primary bg-opacity-10 text-primary px-3 py-2">
                                        <i class="bi bi-mortarboard-fill me-1"></i>Student
                                    </span>
                                    <span th:if="${user.role.name() == 'ROLE_OWNER'}" class="badge rounded-pill bg-success bg-opacity-10 text-success px-3 py-2">
                                        <i class="bi bi-house-fill me-1"></i>Owner
                                    </span>
                                    <span th:if="${user.role.name() == 'ROLE_ADMIN'}" class="badge rounded-pill bg-dark bg-opacity-10 text-dark px-3 py-2">
                                        <i class="bi bi-shield-fill me-1"></i>Admin
                                    </span>
                                </td>
                                <td>
                                    <span th:if="${user.enabled}" class="badge rounded-pill bg-success bg-opacity-10 text-success px-3 py-2">
                                        <i class="bi bi-check-circle-fill me-1"></i>Active
                                    </span>
                                    <span th:unless="${user.enabled}" class="badge rounded-pill bg-danger bg-opacity-10 text-danger px-3 py-2">
                                        <i class="bi bi-x-circle-fill me-1"></i>Disabled
                                    </span>
                                </td>
                                <td class="pe-4 text-end">
                                    <div th:if="${user.role.name() != 'ROLE_ADMIN'}" class="d-inline-flex gap-2">
                                        <!-- Toggle Enable / Disable -->
                                        <form th:action="@{/admin/users/{id}/toggle(id=${user.id})}" method="post" class="d-inline">
                                            <button th:if="${user.enabled}" type="submit" class="btn btn-sm btn-outline-warning rounded-pill px-3"
                                                    title="Disable User">
                                                <i class="bi bi-pause-circle me-1"></i>Disable
                                            </button>
                                            <button th:unless="${user.enabled}" type="submit" class="btn btn-sm btn-outline-success rounded-pill px-3"
                                                    title="Enable User">
                                                <i class="bi bi-play-circle me-1"></i>Enable
                                            </button>
                                        </form>
                                        <!-- Delete -->
                                        <form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post" class="d-inline"
                                              onsubmit="return confirm('Are you sure you want to delete this user? This action cannot be undone.');">
                                            <button type="submit" class="btn btn-sm btn-outline-danger rounded-pill px-3"
                                                    title="Delete User">
                                                <i class="bi bi-trash3 me-1"></i>Delete
                                            </button>
                                        </form>
                                    </div>
                                    <span th:if="${user.role.name() == 'ROLE_ADMIN'}" class="text-muted small fst-italic">
                                        <i class="bi bi-lock-fill me-1"></i>Protected
                                    </span>
                                </td>
                            </tr>
                            <!-- Empty State -->
                            <tr th:if="${#lists.isEmpty(users)}">
                                <td colspan="7" class="text-center py-5 text-muted">
                                    <i class="bi bi-inbox fs-1 d-block mb-2 opacity-50"></i>
                                    No users found.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script th:replace="~{base :: scripts}"></script>
</body>
</html>
