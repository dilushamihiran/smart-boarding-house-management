<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{base :: head('My Complaints')}"></head>
<body class="bg-light">
    <nav th:replace="~{base :: navbar}"></nav>

    <div class="container py-5 mt-5">
        <!-- Flash Messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show rounded-4 shadow-sm" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i>
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Header -->
        <div class="d-flex align-items-center mb-4">
            <div class="rounded-circle d-flex align-items-center justify-content-center me-3"
                 style="width:56px; height:56px; background: linear-gradient(135deg, #ef4444, #dc2626);">
                <i class="bi bi-exclamation-triangle-fill text-white fs-4"></i>
            </div>
            <div>
                <h2 class="fw-bold mb-0">My Complaints</h2>
                <p class="text-muted mb-0">Submit and track your complaints here.</p>
            </div>
        </div>

        <div class="row g-4">
            <!-- Submit Complaint Form -->
            <div class="col-lg-5">
                <div class="card border-0 rounded-4 shadow-sm">
                    <div class="card-header bg-white border-0 pt-4 px-4">
                        <h5 class="fw-bold mb-0">
                            <i class="bi bi-plus-circle me-2 text-danger"></i>New Complaint
                        </h5>
                    </div>
                    <div class="card-body px-4 pb-4">
                        <form th:action="@{/student/complaints/add}" method="post">
                            <div class="mb-3">
                                <label for="boardingHouseId" class="form-label fw-semibold">Boarding House</label>
                                <select class="form-select rounded-3" id="boardingHouseId" name="boardingHouseId" required>
                                    <option value="">-- Select Boarding House --</option>
                                    <option th:each="bh : ${boardingHouses}"
                                            th:value="${bh.id}"
                                            th:text="${bh.name}">BH Name</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="subject" class="form-label fw-semibold">Subject</label>
                                <input type="text" class="form-control rounded-3" id="subject"
                                       name="subject" placeholder="Brief subject..." required />
                            </div>
                            <div class="mb-4">
                                <label for="description" class="form-label fw-semibold">Description</label>
                                <textarea class="form-control rounded-3" id="description"
                                          name="description" rows="4"
                                          placeholder="Describe your issue in detail..." required></textarea>
                            </div>
                            <button type="submit" class="btn btn-danger rounded-pill w-100">
                                <i class="bi bi-send me-2"></i>Submit Complaint
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Complaints List -->
            <div class="col-lg-7">
                <div class="card border-0 rounded-4 shadow-sm">
                    <div class="card-header bg-white border-0 pt-4 px-4">
                        <h5 class="fw-bold mb-0">
                            <i class="bi bi-list-check me-2 text-primary"></i>Complaint History
                        </h5>
                    </div>
                    <div class="card-body px-4 pb-4">
                        <div th:if="${#lists.isEmpty(complaints)}" class="text-center py-5">
                            <i class="bi bi-chat-square-text text-muted" style="font-size: 3rem;"></i>
                            <p class="text-muted mt-3 mb-0">No complaints submitted yet.</p>
                        </div>
                        <div th:unless="${#lists.isEmpty(complaints)}" class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th>Subject</th>
                                        <th>Boarding House</th>
                                        <th>Status</th>
                                        <th>Date</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="c : ${complaints}">
                                        <td class="fw-medium" th:text="${c.subject}">Subject</td>
                                        <td th:text="${c.boardingHouse.name}">BH</td>
                                        <td>
                                            <span class="badge rounded-pill"
                                                  th:classappend="${c.status.name() == 'OPEN' ? 'bg-danger' :
                                                                   (c.status.name() == 'IN_PROGRESS' ? 'bg-warning text-dark' : 'bg-success')}"
                                                  th:text="${c.status}">OPEN</span>
                                        </td>
                                        <td>
                                            <small class="text-muted" th:text="${#temporals.format(c.createdAt, 'dd MMM yyyy')}">01 Jan 2025</small>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:replace="~{base :: scripts}"></script>
</body>
</html>
